function display(arr) {
    const list = document.getElementById('dictionaryList');
    list.innerHTML = "";
    let currentCat = "";
    
    arr.forEach((w, index) => {
        if(w.c !== currentCat) {
            currentCat = w.c;
            const h = document.createElement('div');
            h.className = "category-title";
            h.innerText = currentCat;
            list.appendChild(h);
        }
        const div = document.createElement('div');
        div.className = "word-item";
        div.style.animationDelay = (index % 20 * 0.03) + "s";
        div.innerHTML = `<span class="de">${w.d}</span><span class="ru">${w.r}</span>`;
        list.appendChild(div);
    });
}

function filterWords() {
    const q = document.getElementById('wordSearch').value.toLowerCase();
    const f = words.filter(w => w.d.toLowerCase().includes(q) || w.r.toLowerCase().includes(q));
    display(f);
}
