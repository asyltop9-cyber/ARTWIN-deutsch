    {q: "Er ___ (Konj II) recht haben.", a: ["müsste", "muss", "müsst"], c: 0},
    {q: "Die Arbeit ___ (Passiv) beendet.", a: ["wurde", "worden", "wird"], c: 0},
    {q: "Ich ___ (Zukunft) gehen.", a: ["werde", "würde", "wäre"], c: 0},
    {q: "Er hat ___ (Genitiv) der Ahnen gedacht.", a: ["der", "die", "den"], c: 0},
    {q: "Wir ___ (Passiv) gerufen.", a: ["wurden", "worden", "werden"], c: 0},
    {q: "Er ___ (Konj II) schneller sein.", a: ["wäre", "war", "ist"], c: 0},
    {q: "Das Fenster ___ (Passiv) geputzt.", a: ["wurde", "wird", "beide"], c: 2},
    {q: "Ich ___ (Zukunft) rennen.", a: ["werde", "würde", "werde"], c: 0},

];

// РЕНДЕРИНГ БИЛЕТОВ
const easyGrid = document.getElementById('grid-easy');
const hardGrid = document.getElementById('grid-hard');

for (let i = 1; i <= 20; i++) {
    let btn = document.createElement('button');
    btn.className = 't-btn';
    btn.innerText = i;
    btn.onclick = () => startTicket(i);
    if(i <= 10) easyGrid.appendChild(btn);
    else hardGrid.appendChild(btn);
}

let currentQuestions = [];

function startTicket(num) {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('quiz').style.display = 'block';
    document.getElementById('ticket-title').innerText = `TICKET ${num}`;
    const list = document.getElementById('questions-list');
    list.innerHTML = '';
    let startIdx = (num - 1) * 10;
    currentQuestions = masterDB.slice(startIdx, startIdx + 10);
    currentQuestions.forEach((item, index) => {
        list.innerHTML += `<div class="q-item"><b>${index + 1}. ${item.q}</b>
            <label><input type="radio" name="q${index}" value="0"> ${item.a[0]}</label>
            <label><input type="radio" name="q${index}" value="1"> ${item.a[1]}</label>
            <label><input type="radio" name="q${index}" value="2"> ${item.a[2]}</label></div>`;
    });
    window.scrollTo(0,0);
}

function checkResults() {
    let score = 0;
    currentQuestions.forEach((item, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        if (selected && parseInt(selected.value) === item.c) score++;
    });
    const percent = (score / 10) * 100;
    document.getElementById('quiz').style.display = 'none';
    document.getElementById('result').style.display = 'block';
    document.getElementById('percent-display').innerText = percent + "%";
    document.getElementById('res-status').innerText = percent >= 60 ? "BESTANDEN! ✅" : "DURCHGEFALLEN ❌";
}
</script>
